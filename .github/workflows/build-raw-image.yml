name: Build Raw Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Raspberry Pi ARM64 Raw Disk Image
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Delete unnecessary tools to free up disk space
        run: sudo rm -rf /opt/hostedtoolcache

      - name: Install image tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y dosfstools gdisk mtools util-linux xfsprogs zstd

      - name: Build Bootc Container Image locally
        run: |
          sudo podman build \
            --platform linux/arm64 \
            -t localhost/rhs-bootstrapper:raspberrypi-arm64 \
            -f Containerfile .

      - name: Validate Bootc runtime packages
        run: |
          sudo podman run --rm --platform linux/arm64 localhost/rhs-bootstrapper:raspberrypi-arm64 uname -m | grep -Eq '^(aarch64|arm64)$'
          sudo podman run --rm --platform linux/arm64 localhost/rhs-bootstrapper:raspberrypi-arm64 \
            rpm -q \
              iputils \
              jq \
              NetworkManager \
              NetworkManager-wifi \
              openssh-server \
              wpa_supplicant \
              wireless-regdb

      - name: Build Raw Disk Image using bootc-image-builder
        run: |
          sudo mkdir -p ./output
          echo -e '[[customizations.filesystem]]\nmountpoint = "/"\nminsize = "3 GiB"' > ./config.toml
          sudo podman run \
            --rm \
            --privileged \
            --pull=newer \
            --security-opt label=type:unconfined_t \
            -v ./config.toml:/config.toml \
            -v ./output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --config /config.toml \
            build \
            --target-arch arm64 \
            --type raw \
            --rootfs xfs \
            localhost/rhs-bootstrapper:raspberrypi-arm64

      - name: Inject and validate Raspberry Pi boot assets
        run: bash scripts/postprocess-raspberrypi-arm64.sh output/image/disk.raw

      - name: Compress and checksum output file
        run: |
          sudo zstd -T0 -19 --rm output/image/disk.raw -o output/image/rhs-bootstrapper-raspberrypi-arm64.raw.zst
          cd output/image
          sudo sha256sum rhs-bootstrapper-raspberrypi-arm64.raw.zst | sudo tee rhs-bootstrapper-raspberrypi-arm64.raw.zst.sha256 >/dev/null

      - name: Smoke check compressed Raspberry Pi artifact
        run: bash scripts/smoke-check-raspberrypi-artifact.sh output/image/rhs-bootstrapper-raspberrypi-arm64.raw.zst output/image/rhs-bootstrapper-raspberrypi-arm64.raw.zst.sha256

      - name: Determine Release Tag
        id: release_tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
            echo "RELEASE_NAME=Release ${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "TAG_NAME=latest" >> $GITHUB_ENV
            echo "RELEASE_NAME=Latest Nightly Build" >> $GITHUB_ENV
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          files: |
            output/image/rhs-bootstrapper-raspberrypi-arm64.raw.zst
            output/image/rhs-bootstrapper-raspberrypi-arm64.raw.zst.sha256
          prerelease: ${{ env.TAG_NAME == 'latest' }}
          make_latest: ${{ env.TAG_NAME != 'latest' }}
